<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Clock outer circle -->
  <circle cx="32" cy="32" r="18" stroke="white" stroke-width="2.5"/>
  <!-- Clock markers at 12, 3, 6, 9 -->
  <g stroke="white" stroke-width="2" stroke-linecap="round">
    <line x1="32" y1="14" x2="32" y2="17"/>
    <line x1="50" y1="32" x2="47" y2="32"/>
    <line x1="32" y1="50" x2="32" y2="47"/>
    <line x1="14" y1="32" x2="17" y2="32"/>
  </g>
  <!-- Hour hand -->
  <line x1="32" y1="32" x2="32" y2="20" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Minute hand -->
  <line x1="32" y1="32" x2="42" y2="38" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="2.5" fill="white"/>
</svg>